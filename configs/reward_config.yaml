fluency_reward:
  model_name_or_path: /path/to/guwenbert
  weight: 0.30
  score: pseudo_log_likelihood
  normalize: true

semantic_reward:
  model_name_or_path: BAAI/bge-large-zh-v1.5
  weight: 0.50
  lambda_sem: 0.50
  normalize: true

style_reward:
  model_name_or_path: /path/to/classical-chinese-roberta
  weight: 0.20
  score: log_probability
  normalize: true

text_normalization:
  remove_spaces: true
  remove_common_punctuation: true
