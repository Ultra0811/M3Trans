algorithm: grpo
policy_model: outputs/qwen2_5vl_7b_m3trans_sft
reference_model: outputs/qwen2_5vl_7b_m3trans_sft
train_file: data/mwtrans_train_srga.json
valid_file: data/mwtrans_valid.json
output_dir: outputs/qwen2_5vl_7b_m3trans_srga

group_size: 8
kl_coef: 0.04
learning_rate: 5.0e-7
max_prompt_length: 4096
max_response_length: 128
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
num_train_epochs: 1
bf16: true

generation:
  temperature: 1.0
  top_p: 0.95
  max_new_tokens: 128

reward_config: configs/reward_config.yaml
reward_weights:
  fluency: 0.30
  semantic: 0.50
  style: 0.20
